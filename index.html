<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control | OpenClaw</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="logo">🐾</span>
                <h1>Mission Control</h1>
            </div>
            <nav class="sidebar-nav">
                <a href="#dashboard" class="nav-item active" data-view="dashboard">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="#oficina" class="nav-item" data-view="oficina">
                    <span class="icon">🏢</span>
                    <span>Oficina</span>
                </a>
                <a href="#skills" class="nav-item" data-view="skills">
                    <span class="icon">🛠️</span>
                    <span>Skills</span>
                </a>
                <a href="#agents" class="nav-item" data-view="agents">
                    <span class="icon">🎯</span>
                    <span>Agentes</span>
                </a>
                <a href="#chats" class="nav-item" data-view="chats">
                    <span class="icon">💬</span>
                    <span>Chats</span>
                </a>
                <a href="#sessions" class="nav-item" data-view="sessions">
                    <span class="icon">🔌</span>
                    <span>Sesiones</span>
                </a>
                <a href="#memory" class="nav-item" data-view="memory">
                    <span class="icon">🧠</span>
                    <span>Memoria</span>
                </a>
                <a href="#config" class="nav-item" data-view="config">
                    <span class="icon">⚙️</span>
                    <span>Config</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <span id="connection-status" class="status offline">● Cargando...</span>
                <span class="version">v1.1.0</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button id="menu-toggle" class="menu-toggle">☰</button>
                <h2 id="page-title">Dashboard</h2>
                <div class="header-actions">
                    <button class="btn btn-refresh" id="refresh-btn">🔄</button>
                </div>
            </header>
            <div id="content" class="content">
                <!-- Dynamic content loaded here -->
            </div>
        </main>
    </div>

    <!-- Scripts - ORDER MATTERS! -->
    <script src="js/views.js"></script>      <!-- Views registry FIRST -->
    <script src="js/api.js"></script>
    <script src="js/components/cards.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/skills.js"></script>
    <script src="js/views/agents.js"></script>
    <script src="js/views/chats.js"></script>
    <script src="js/views/sessions.js"></script>
    <script src="js/views/memory.js"></script>
    <script src="js/views/config.js"></script>
    <script src="js/views/oficina.js"></script>  <!-- NEW: Oficina view -->
    <script src="js/app.js"></script>          <!-- App LAST -->
</body>
</html>
